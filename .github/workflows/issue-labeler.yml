name: Issue Auto Labeler

on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
    - name: Auto label issue
      uses: actions/github-script@v6
      with:
        script: |
          const { owner, repo } = context.repo;
          const issueNumber = context.payload.issue.number;
          const issueTitle = context.payload.issue.title.toLowerCase();
          const issueBody = (context.payload.issue.body || '').toLowerCase();
          const labels = [];
          
          // 타입 라벨 분류
          if (issueTitle.includes('[bug]') || issueTitle.includes('bug') || 
              issueBody.includes('error') || issueBody.includes('문제') || 
              issueBody.includes('오류') || issueBody.includes('버그')) {
            labels.push('type: bug');
          } else if (issueTitle.includes('[feature]') || issueTitle.includes('feature') || 
                     issueTitle.includes('기능') || issueBody.includes('새로운') ||
                     issueBody.includes('추가') || issueBody.includes('개발')) {
            labels.push('type: feature');
          } else if (issueTitle.includes('[enhancement]') || issueTitle.includes('enhancement') || 
                     issueTitle.includes('개선') || issueBody.includes('향상') ||
                     issueBody.includes('최적화')) {
            labels.push('type: enhancement');
          } else if (issueTitle.includes('[question]') || issueTitle.includes('question') || 
                     issueTitle.includes('질문') || issueBody.includes('궁금') ||
                     issueBody.includes('문의')) {
            labels.push('type: question');
          } else if (issueTitle.includes('[docs]') || issueTitle.includes('documentation') || 
                     issueTitle.includes('문서') || issueBody.includes('readme') ||
                     issueBody.includes('가이드')) {
            labels.push('type: documentation');
          }
          
          // 컴포넌트 라벨 분류
          if (issueTitle.includes('backend') || issueBody.includes('backend') || 
              issueTitle.includes('api') || issueBody.includes('fastapi') ||
              issueBody.includes('서버')) {
            labels.push('component: backend');
          }
          
          if (issueTitle.includes('frontend') || issueBody.includes('frontend') || 
              issueTitle.includes('ui') || issueBody.includes('streamlit') ||
              issueBody.includes('화면') || issueBody.includes('인터페이스')) {
            labels.push('component: frontend');
          }
          
          if (issueTitle.includes('agent') || issueBody.includes('agent') || 
              issueTitle.includes('ai') || issueBody.includes('langgraph') ||
              issueBody.includes('llm') || issueBody.includes('gemini')) {
            labels.push('component: agent');
          }
          
          if (issueTitle.includes('test') || issueBody.includes('test') || 
              issueTitle.includes('pytest') || issueBody.includes('테스트')) {
            labels.push('component: test');
          }
          
          // 우선순위 라벨 분류
          if (issueTitle.includes('urgent') || issueTitle.includes('critical') || 
              issueBody.includes('긴급') || issueBody.includes('심각') ||
              issueBody.includes('치명적')) {
            labels.push('priority: critical');
          } else if (issueTitle.includes('high') || issueBody.includes('높은') ||
                     issueBody.includes('중요한')) {
            labels.push('priority: high');
          } else if (issueTitle.includes('low') || issueBody.includes('낮은') ||
                     issueBody.includes('단순한')) {
            labels.push('priority: low');
          } else {
            labels.push('priority: medium');
          }
          
          // 상태 라벨 추가
          labels.push('status: review-needed');
          
          // 라벨 적용
          if (labels.length > 0) {
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: labels
            });
            
            console.log(`Applied labels: ${labels.join(', ')}`);
          } 